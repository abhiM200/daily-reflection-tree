<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Reflection Tool | PDGMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header>
            <div class="logo">DT Fellowship</div>
            <div class="status">Scientific Execution Platform</div>
        </header>

        <section id="app-content">
            <div id="node-display" class="fade-in">
                <h1 id="question-text">Loading reflection tree...</h1>
                <div id="options-container" class="options-grid"></div>
            </div>
        </section>

        <footer id="tracker">
            <div class="axis-tracker">
                <span class="label">Locus:</span> <span id="locus-val">--</span>
                <span class="divider">|</span>
                <span class="label">Orientation:</span> <span id="orient-val">--</span>
                <span class="divider">|</span>
                <span class="label">Radius:</span> <span id="radius-val">--</span>
            </div>
            <div class="credits">Developed by Abhishek</div>
        </footer>
    </main>

    <script src="tree_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
